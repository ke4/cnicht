name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run headless Cypress component tests
        working-directory: frontend
        run: npx cypress run --component

      - name: Build and test backend (JUnit & bootJar)
        run: ./gradlew :backend:build

      - name: Docker build
        run: docker build -t cnicht:latest .

      - name: Mock Kubernetes deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Deploying to Kubernetes (Mock)..."
          echo "kubectl apply -f k8s/postgres-db.yaml"
          echo "kubectl apply -f k8s/Cnicht-deployment.yaml"
          echo "kubectl apply -f k8s/Cnicht-service.yaml"
